<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d12" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>知语 Zhiyu</title>
    <!-- Vibrant, app-style web fonts (per-language). Order: latin → CJK → SEA → display accent. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&family=ZCOOL+KuaiLe&family=LXGW+WenKai+TC&family=Be+Vietnam+Pro:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Pacifico&display=swap"
    />
    <script>
      (function(){try{
        var k='zhiyu:theme';
        var s=localStorage.getItem(k);
        var m=(s==='light'||s==='dark'||s==='system')?s:'system';
        var d=m==='dark'||(m==='system'&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches);
        var r=document.documentElement;
        r.setAttribute('data-theme',d?'dark':'light');
        if(d)r.classList.add('dark');
        r.style.colorScheme=d?'dark':'light';
      }catch(_){}})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
