# Supabase API gateway · 把 /auth/v1/* → GoTrue，/rest/v1/* → PostgREST。
# 简化版 Kong：仅做路径前缀剥离 + CORS 透传。

worker_processes auto;
events { worker_connections 1024; }

http {
  resolver 127.0.0.11 ipv6=off valid=10s;
  proxy_http_version 1.1;
  proxy_set_header  Host              $host;
  proxy_set_header  X-Real-IP         $remote_addr;
  proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header  X-Forwarded-Proto $scheme;
  proxy_set_header  Connection        "";

  server {
    listen 8000;

    # ---- Auth (GoTrue) ----
    location /auth/v1/ {
      proxy_pass http://supabase-auth:9999/;
    }
    # ---- REST (PostgREST) ----
    location /rest/v1/ {
      # PostgREST 需要 Authorization 透传；JWT 内含 role
      proxy_pass http://supabase-rest:3000/;
    }
    # ---- 健康 ----
    location = /health {
      default_type application/json;
      return 200 '{"code":0,"data":{"gateway":"up"}}';
    }
    location = / {
      default_type application/json;
      return 200 '{"code":0,"data":{"service":"supabase-gateway"}}';
    }
  }
}
